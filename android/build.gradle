// apply plugin: "com.facebook.react.rootproject"

buildscript {
    ext {
        buildToolsVersion = "36.0.0"
        minSdkVersion = 24
        compileSdkVersion = 36
        targetSdkVersion = 36
        ndkVersion = "29.0.14206865"
        kotlinVersion = "2.1.20"
    }
    repositories {
        google()
        mavenCentral()
        maven { url("https://www.jitpack.io") } // <- AsyncStorage ke liye
    }
    dependencies {
        classpath("com.android.tools.build:gradle:8.1.1") // <- explicit version add karo
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlinVersion")
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
        maven { url("https://www.jitpack.io") } // <- ye bhi add karna
    }
}

apply plugin: "com.facebook.react.rootproject"
